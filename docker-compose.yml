# =============================================================================
# Docker Compose for Aigency Gateway stack
#
# Services:
#   sugar-db  — SugarDB key-value/document store
#   vault     — Admin token / API key store (placeholder: uses node:22-alpine
#               until a proper Dockerfile is authored — see OPERATIONS.md)
#   gateway   — @aigency/gateway (built from ../Dockerfile)
#   caddy     — Reverse proxy with header propagation
# =============================================================================

volumes:
  sugar-db-data:
  caddy_data:
  caddy_config:

services:
  # --------------------------------------------------------------------------
  # SugarDB — backend data store
  # --------------------------------------------------------------------------
  sugar-db:
    image: sugardb/sugardb:latest
    ports:
      - "8081:8081"
    volumes:
      - sugar-db-data:/data
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Vault — admin token / API key management (placeholder)
  # --------------------------------------------------------------------------
  vault:
    image: node:22-alpine
    command: ["node", "-e", "setInterval(()=>{},1<<30)"]  # placeholder: keep-alive
    ports:
      - "8082:8082"
    environment:
      GATEWAY_VAULT_URL: http://sugar-db:8081
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Gateway — core API server (internal, not exposed to host)
  # --------------------------------------------------------------------------
  gateway:
    build: .
    expose:
      - "8080"
    depends_on:
      - sugar-db
      - vault
    environment:
      GATEWAY_SUGAR_DB_URL: http://sugar-db:8081
      GATEWAY_VAULT_URL: http://vault:8082
      GATEWAY_ADMIN_TOKEN: ${GATEWAY_ADMIN_TOKEN}
      GATEWAY_RATE_LIMITING: ${GATEWAY_RATE_LIMITING:-false}
      GATEWAY_ADMIN_AUTH: ${GATEWAY_ADMIN_AUTH:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Caddy — HTTPS reverse proxy with auto TLS and header propagation
  # --------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
    restart: unless-stopped
