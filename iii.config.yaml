workers:
  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0
      default_timeout: 300000
      concurrency_request_limit: 2048
      cors:
        allowed_origins: ['*']
        allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/state

  - name: iii-stream
    config:
      port: 3112
      host: 0.0.0.0
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/streams

  - name: iii-queue
    config:
      adapter:
        name: builtin

  - name: iii-pubsub
    config:
      adapter:
        name: local

  - name: iii-cron
    config:
      adapter:
        name: kv

  - name: iii-observability
    config:
      enabled: true
      service_name: aigency-router
      exporter: memory
      metrics_enabled: true
